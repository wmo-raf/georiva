<style>
    /* Shared stage-lane / product-card styling for the derived-products chain,
       used by both the wizard step (wizard mode) and the feed-detail panel
       (manage mode). Kept in one place so the two surfaces can't drift. */
    .gprod-stage {
        margin-bottom: 1.5em;
    }

    .gprod-stage__label {
        display: flex;
        align-items: center;
        gap: 0.5em;
        font-size: 0.75em;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--w-color-grey-400);
        margin: 0 0 0.6em;
    }

    .gprod-stage__label::after {
        content: "";
        flex: 1 1 auto;
        height: 1px;
        background: var(--w-color-border-furniture);
    }

    .gprod-card {
        border: 2px solid var(--w-color-border-furniture);
        border-radius: 8px;
        margin-bottom: 1em;
        overflow: hidden;
    }

    .gprod-card--disabled {
        opacity: 0.6;
    }

    .gprod-card__header {
        padding: 0.85em 1.1em;
        background: var(--w-color-grey-50);
    }

    .gprod-card__toggle {
        display: flex;
        align-items: center;
        gap: 0.55em;
        margin: 0 0 0.2em;
        cursor: pointer;
    }

    .gprod-card__enable {
        width: 1.05em;
        height: 1.05em;
        flex: 0 0 auto;
    }

    .gprod-card__title-row {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.55em;
        margin-bottom: 0.2em;
    }

    .gprod-card__name {
        font-weight: 700;
        font-size: 1em;
        margin: 0;
    }

    .gprod-card__desc {
        font-size: 0.82em;
        color: var(--w-color-grey-400);
        margin: 0;
    }

    .gprod-needs {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.4em;
        margin: 0.5em 0 0;
        font-size: 0.78em;
        color: var(--w-color-grey-400);
    }

    .gprod-needs__chip {
        padding: 0.15em 0.6em;
        border-radius: 999px;
        background: var(--w-color-surface-field);
        border: 1px solid var(--w-color-border-furniture);
        color: var(--w-color-text-label);
        font-weight: 600;
    }

    .gprod-config-section {
        padding: 0.85em 1.1em;
        border-top: 1px solid var(--w-color-border-furniture);
    }

    .gprod-config-section .w-field__wrapper {
        margin-bottom: 0.75em;
    }

    /* --- Manage-mode extras (feed-detail panel) --- */
    .gprod-badge {
        font-size: 0.7em;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 0.15em 0.55em;
        border-radius: 999px;
    }

    .gprod-badge--on {
        background: color-mix(in srgb, var(--w-color-positive-100) 15%, transparent);
        color: var(--w-color-positive-100);
    }

    .gprod-badge--off {
        background: var(--w-color-grey-100);
        color: var(--w-color-grey-400);
    }

    .gprod-pill {
        font-size: 0.72em;
        font-weight: 600;
        padding: 0.15em 0.6em;
        border-radius: 999px;
        border: 1px solid var(--w-color-border-furniture);
        color: var(--w-color-text-label);
        text-transform: capitalize;
    }

    .gprod-pill--running {
        background: var(--w-color-info-100);
        color: var(--w-color-white);
        border-color: var(--w-color-info-100);
    }

    .gprod-pill--failed {
        background: color-mix(in srgb, var(--w-color-critical-200) 12%, transparent);
        color: var(--w-color-critical-200);
        border-color: color-mix(in srgb, var(--w-color-critical-200) 40%, transparent);
    }

    .gprod-pill--completed {
        background: color-mix(in srgb, var(--w-color-positive-100) 12%, transparent);
        color: var(--w-color-positive-100);
        border-color: color-mix(in srgb, var(--w-color-positive-100) 35%, transparent);
    }

    .gprod-card__edit {
        margin-left: auto;
        font-size: 0.8em;
        font-weight: 600;
    }

    .gprod-manage-body {
        padding: 0.85em 1.1em;
        border-top: 1px solid var(--w-color-border-furniture);
        display: flex;
        flex-direction: column;
        gap: 0.7em;
    }

    .gprod-outputs {
        font-size: 0.8em;
        color: var(--w-color-text-label);
        display: flex;
        flex-wrap: wrap;
        gap: 0.4em;
        align-items: center;
    }

    .gprod-outputs__label {
        color: var(--w-color-grey-400);
        font-weight: 600;
    }

    .gprod-outputs__item {
        padding: 0.1em 0.55em;
        border-radius: 4px;
        background: var(--w-color-surface-field);
        border: 1px solid var(--w-color-border-furniture);
    }

    .gprod-readiness {
        font-size: 0.8em;
        color: var(--w-color-critical-200);
        margin: 0;
    }

    .gprod-readiness__hint {
        display: block;
        color: var(--w-color-grey-400);
        margin-top: 0.2em;
    }

    .gprod-actions {
        display: flex;
        gap: 0.5em;
        flex-wrap: wrap;
    }

    .gprod-actions form {
        margin: 0;
    }
</style>

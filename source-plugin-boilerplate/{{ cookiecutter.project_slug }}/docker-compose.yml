services:
  georiva:
    build:
      context: .
      dockerfile: dev.Dockerfile
      args:
        PLUGIN_BUILD_UID: ${PLUGIN_BUILD_UID}
        PLUGIN_BUILD_GID: ${PLUGIN_BUILD_GID}
    image: {{ cookiecutter.project_slug }}:latest
    volumes:
      - ./plugins/{{ cookiecutter.project_module }}:/georiva/data/plugins/{{ cookiecutter.project_module }}
    ports:
      - "${PORT:-8080}:8000"
    env_file:
      - .env
